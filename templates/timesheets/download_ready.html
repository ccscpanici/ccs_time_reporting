{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h1 class="h4 mb-0">Timesheet Download</h1>
      </div>
      <div class="card-body">
        <p>Your timesheet for week of <strong>{{ timesheet.week_start|date:"m/d/Y" }}</strong> is ready.</p>

        <p>Your download should start automatically.</p>

        <iframe
          src="{% url 'timesheet_artifact_download' artifact.pk %}"
          style="display:none;"
          title="Timesheet download"
        ></iframe>

        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="{% url 'timesheet_artifact_download' artifact.pk %}">
            Download Again
          </a>

          <a class="btn btn-outline-secondary" href="{{ redirect_url }}">
            Return to Timesheet
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.setTimeout(function () {
  window.location.href = "{{ redirect_url }}";
}, 2500);
</script>
{% endblock %}
