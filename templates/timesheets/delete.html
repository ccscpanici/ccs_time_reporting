{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body p-4">
    <h1 class="h3">Delete timesheet</h1>
    <p>Delete or void the timesheet for week of <strong>{{ timesheet.week_start }}</strong>.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.reason.label_tag }}
      {{ form.reason }}
      <div class="mt-3">
        <button class="btn btn-danger">Confirm</button>
        <a class="btn btn-outline-secondary" href="{{ timesheet.get_absolute_url }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
